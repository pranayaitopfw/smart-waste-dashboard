<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Waste Monitoring System</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="bg-animation">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
</div>

<div class="container">
<header>
<h1>Smart Waste Monitoring System</h1>
<p>ESP32 + Ultrasonic + MQ135 Dashboard</p>
</header>

<section class="cards">
<div class="card"><h3>Trash Level</h3><div id="trashPercent">72%</div></div>
<div class="card"><h3>Air Quality</h3><div id="airStatus">GOOD</div></div>
<div class="card"><h3>Bin Status</h3><div id="binStatus">Medium</div></div>
<div class="card"><h3>Last Update</h3><div id="lastUpdate">Live</div></div>
</section>

<section class="progress-section">
<h2>Trash Fill Level</h2>
<div class="progress-ring">
<svg width="220" height="220">
<circle cx="110" cy="110" r="90" class="bg"></circle>
<circle cx="110" cy="110" r="90" class="progress"></circle>
</svg>
<div class="progress-text">72%</div>
</div>
</section>

<div class="alert-card">⚠ No Active Alerts</div>

<section class="charts">
<div class="chart-card"><canvas id="trashChart"></canvas></div>
<div class="chart-card"><canvas id="airChart"></canvas></div>
</section>
</div>

<script src="script.js"></script>
</body>
</html>
